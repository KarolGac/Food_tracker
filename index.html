<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Calories">
  <title>Calorie Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      background: #080808; color: #e8e8e8;
      font-family: -apple-system, 'Inter', sans-serif;
      min-height: 100vh; max-width: 430px; margin: 0 auto; padding-bottom: 80px;
    }
    .header {
      padding: 52px 20px 16px; border-bottom: 1px solid #1a0008;
      display: flex; justify-content: space-between; align-items: flex-end;
      background: linear-gradient(180deg, #110004 0%, #080808 100%);
    }
    .header h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; color: #fff; text-shadow: 0 0 30px rgba(232,0,58,0.5); }
    .header p { font-size: 12px; color: #666; margin-top: 3px; }
    .save-badge { font-size: 11px; color: #e8003a; }
    .rings { display: flex; justify-content: space-around; padding: 24px 16px 12px; }
    .ring-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .ring-svg { transform: rotate(-90deg); }
    .ring-val { font-weight: 800; line-height: 1; color: #fff; }
    .ring-max { color: #444; line-height: 1.2; }
    .ring-label { font-size: 13px; font-weight: 700; text-align: center; color: #aaa; }
    .ring-sub { font-size: 11px; color: #444; text-align: center; }
    .remaining-card {
      background: #0f0005; border: 1px solid #2a0010; border-radius: 14px;
      padding: 16px; margin: 0 16px 14px; text-align: center;
      box-shadow: 0 4px 24px rgba(232,0,58,0.08), inset 0 1px 0 rgba(255,255,255,0.03);
    }
    .remaining-label { font-size: 12px; color: #555; margin-bottom: 4px; letter-spacing: 0.5px; text-transform: uppercase; }
    .remaining-val { font-size: 34px; font-weight: 800; letter-spacing: -1px; }
    .section { padding: 16px; }
    .section-title { font-size: 11px; font-weight: 700; color: #444; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; }
    .log-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #1a0008; }
    .log-left { display: flex; align-items: center; gap: 12px; }
    .log-emoji { font-size: 22px; }
    .log-name { font-size: 14px; font-weight: 600; color: #e8e8e8; }
    .log-meta { font-size: 12px; color: #555; margin-top: 1px; }
    .remove-btn { background: none; border: none; color: #e8003a; font-size: 20px; cursor: pointer; padding: 4px 8px; line-height: 1; opacity: 0.5; }
    .remove-btn:active { opacity: 1; }
    .empty-msg { text-align: center; color: #333; padding: 28px 0; font-size: 14px; }
    .btn-primary {
      width: 100%; padding: 15px; background: #e8003a; color: #fff;
      border: none; border-radius: 12px; font-weight: 800; font-size: 15px;
      cursor: pointer; margin-top: 8px; display: block;
      box-shadow: 0 4px 20px rgba(232,0,58,0.35);
    }
    .btn-primary:active { transform: scale(0.98); }
    .btn-secondary {
      width: 100%; padding: 14px; background: #150008; color: #aaa;
      border: 1px solid #2a0010; border-radius: 12px; font-weight: 700; font-size: 15px;
      cursor: pointer; margin-top: 6px; display: block;
    }
    .btn-ghost { width: 100%; padding: 12px; background: none; color: #444; border: none; border-radius: 12px; font-weight: 600; font-size: 14px; cursor: pointer; margin-top: 4px; display: block; }

    .meal-item {
      background: #0f0005; border: 1px solid #1a0008; border-radius: 10px;
      padding: 10px 12px; margin-bottom: 8px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      transition: border-color 0.15s, background 0.15s;
    }
    .meal-item.selected { border-color: #e8003a; background: #1a0008; }
    .meal-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; cursor: pointer; }
    .meal-emoji { font-size: 22px; flex-shrink: 0; }
    .meal-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #e8e8e8; }
    .meal-cal { font-size: 11px; color: #555; }
    .meal-controls { display: flex; align-items: center; gap: 5px; flex-shrink: 0; margin-left: 6px; }
    .qty-btn {
      background: #1a0008; border: 1px solid #2a0010; border-radius: 7px; color: #aaa;
      width: 28px; height: 28px; font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-weight: 700;
    }
    .qty-num { font-size: 14px; font-weight: 700; min-width: 18px; text-align: center; color: #fff; }
    .meal-check {
      width: 26px; height: 26px; border-radius: 7px; border: 2px solid #2a0010;
      background: #0f0005; display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; margin-left: 4px; font-size: 13px;
      transition: all 0.15s;
    }
    .meal-check.checked { background: #e8003a; border-color: #e8003a; color: #fff; }
    .meal-delete {
      background: none; border: none; color: #e8003a; font-size: 15px;
      cursor: pointer; padding: 4px 6px; opacity: 0.35; flex-shrink: 0; margin-left: 2px;
    }
    .meal-delete:active { opacity: 1; }

    .basket-bar {
      position: sticky; bottom: 80px;
      background: #0f0005; border: 1px solid #e8003a; border-radius: 12px;
      margin: 8px 0 4px; padding: 12px 14px;
      display: none; align-items: center; justify-content: space-between;
      box-shadow: 0 4px 20px rgba(232,0,58,0.2);
    }
    .basket-bar.visible { display: flex; }
    .basket-info { font-size: 13px; color: #aaa; }
    .basket-info strong { color: #fff; font-size: 15px; }
    .basket-add-btn {
      background: #e8003a; color: #fff; border: none; border-radius: 9px;
      padding: 9px 16px; font-weight: 800; font-size: 13px; cursor: pointer;
      box-shadow: 0 2px 10px rgba(232,0,58,0.3);
    }

    .input {
      width: 100%; background: #0f0005; border: 1px solid #2a0010;
      border-radius: 10px; padding: 12px 14px; color: #e8e8e8; font-size: 15px; margin-bottom: 8px;
    }
    .input::placeholder { color: #444; }
    .input:focus { outline: none; border-color: #e8003a; box-shadow: 0 0 0 3px rgba(232,0,58,0.1); }

    .history-day { background: #0f0005; border: 1px solid #1a0008; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; }
    .history-date { font-size: 14px; font-weight: 700; margin-bottom: 8px; color: #e8e8e8; }
    .badges { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
    .badge { border-radius: 6px; padding: 2px 8px; font-size: 12px; font-weight: 600; }
    .history-item { font-size: 12px; color: #444; padding: 2px 0; }

    .bottom-nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px; background: #0a0002; border-top: 1px solid #1a0008;
      display: flex; z-index: 100; padding-bottom: env(safe-area-inset-bottom);
      box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
    }
    .nav-btn { flex: 1; padding: 14px 0 10px; background: none; border: none; font-size: 11px; font-weight: 500; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; color: #333; }
    .nav-btn.active { color: #e8003a; font-weight: 700; }
    .nav-icon { font-size: 20px; }
    .view { display: none; }
    .view.active { display: block; }
    #select-section { display: none; margin-top: 12px; }
    #new-meal-section { display: none; margin-top: 12px; }
  </style>
</head>
<body>

<div class="header">
  <div>
    <h1>Calorie Tracker</h1>
    <p>Doel: 2500 kcal · 170g eiwit</p>
  </div>
  <span class="save-badge" id="save-badge"></span>
</div>

<div class="view active" id="view-today">
  <div class="rings">
    <div class="ring-wrap">
      <div style="position:relative;width:130px;height:130px;">
        <svg class="ring-svg" width="130" height="130" style="position:absolute;top:0;left:0;">
          <circle cx="65" cy="65" r="59" fill="none" stroke="#1a0008" stroke-width="10"/>
          <circle id="ring-cal-circle" cx="65" cy="65" r="59" fill="none" stroke="#e8003a" stroke-width="10"
            stroke-dasharray="0 370.7" stroke-linecap="round" style="transition:stroke-dasharray 0.4s ease;filter:drop-shadow(0 0 6px rgba(232,0,58,0.6));"/>
        </svg>
        <div style="position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;">
          <span class="ring-val" id="ring-cal-val" style="font-size:23px;">0</span>
          <span class="ring-max" style="font-size:14px;">/ 2500</span>
        </div>
      </div>
      <div class="ring-label">Calorieën</div>
      <div class="ring-sub">kcal</div>
    </div>
    <div class="ring-wrap">
      <div style="position:relative;width:130px;height:130px;">
        <svg class="ring-svg" width="130" height="130" style="position:absolute;top:0;left:0;">
          <circle cx="65" cy="65" r="59" fill="none" stroke="#1a0008" stroke-width="10"/>
          <circle id="ring-prot-circle" cx="65" cy="65" r="59" fill="none" stroke="#888" stroke-width="10"
            stroke-dasharray="0 370.7" stroke-linecap="round" style="transition:stroke-dasharray 0.4s ease;filter:drop-shadow(0 0 4px rgba(180,180,180,0.3));"/>
        </svg>
        <div style="position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;">
          <span class="ring-val" id="ring-prot-val" style="font-size:23px;">0</span>
          <span class="ring-max" style="font-size:14px;">/ 170</span>
        </div>
      </div>
      <div class="ring-label">Eiwit</div>
      <div class="ring-sub">gram</div>
    </div>
  </div>

  <div class="remaining-card">
    <div class="remaining-label">Nog over vandaag</div>
    <div class="remaining-val" id="remaining-val" style="color:#e8003a;">2500 kcal</div>
  </div>

  <div class="section">
    <div class="section-title">Gegeten vandaag</div>
    <div id="log-list"></div>
    <button class="btn-primary" id="add-meal-btn" onclick="showSelectSection()">+ Maaltijd toevoegen</button>

    <!-- Select section -->
    <div id="select-section">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <div class="section-title" style="margin-bottom:0;">Maaltijden</div>
        <button onclick="showNewMealForm()" style="background:none;border:none;color:#e8003a;font-size:13px;font-weight:700;cursor:pointer;">+ Nieuw</button>
      </div>
      <div id="meals-list"></div>
      <div class="basket-bar" id="basket-bar">
        <div class="basket-info">
          <strong id="basket-cal">0</strong> kcal · <span id="basket-prot">0</span>g eiwit
        </div>
        <button class="basket-add-btn" onclick="addBasket()">Voeg toe ✓</button>
      </div>
      <button class="btn-ghost" onclick="hideAll()">Annuleren</button>
    </div>

    <!-- New meal form -->
    <div id="new-meal-section">
      <div class="section-title" style="margin-top:8px;">Nieuwe maaltijd</div>
      <input class="input" id="new-name" placeholder="Naam (bijv. Rijst 200g)" type="text">
      <input class="input" id="new-cal" placeholder="Calorieën (kcal)" type="number" inputmode="numeric">
      <input class="input" id="new-prot" placeholder="Eiwit (gram)" type="number" inputmode="numeric">
      <button class="btn-primary" onclick="saveNewMeal()">Opslaan</button>
      <button class="btn-ghost" onclick="backToSelect()">Terug</button>
    </div>
  </div>
</div>

<div class="view" id="view-history">
  <div class="section">
    <div class="section-title">Afgelopen dagen</div>
    <div id="history-list"></div>
  </div>
</div>

<div class="bottom-nav">
  <button class="nav-btn active" id="nav-today" onclick="switchView('today')">
    <span class="nav-icon">🏠</span>Vandaag
  </button>
  <button class="nav-btn" id="nav-history" onclick="switchView('history')">
    <span class="nav-icon">📅</span>Geschiedenis
  </button>
</div>

<script>
  const CALORIE_GOAL = 2500;
  const PROTEIN_GOAL = 170;
  const CIRC = 2 * Math.PI * 59;

  const DEFAULT_MEALS = [
    { id: "d0", name: "Ei", cal: 70, protein: 6, emoji: "🥚" },
    { id: "d1", name: "Ontbijtspek (1 slice)", cal: 30, protein: 3, emoji: "🥓" },
    { id: "d2", name: "Banaan", cal: 90, protein: 1, emoji: "🍌" },
    { id: "d3", name: "Kiwi", cal: 40, protein: 1, emoji: "🥝" },
    { id: "d4", name: "Upfront Oats (75g)", cal: 301, protein: 18, emoji: "🥣" },
    { id: "d5", name: "Bulk Whey (1 scoop)", cal: 115, protein: 22, emoji: "💪" },
    { id: "d6", name: "Kipfilet (100g)", cal: 110, protein: 23, emoji: "🍗" },
    { id: "d7", name: "Kip dij (100g)", cal: 190, protein: 18, emoji: "🍗" },
    { id: "d8", name: "Aardappelen (100g)", cal: 85, protein: 2, emoji: "🥔" },
    { id: "d9", name: "Turkse pizza", cal: 1000, protein: 45, emoji: "🍕" },
    { id: "d10", name: "Koreaanse mango ice", cal: 110, protein: 1, emoji: "🍦" },
  ];

  let quantities = {};
  let selected = {};

  function getTodayKey() { return new Date().toISOString().split("T")[0]; }

  function loadDays() {
    try { return JSON.parse(localStorage.getItem("calorie-days") || "{}"); } catch { return {}; }
  }
  function saveDays(days) {
    try {
      localStorage.setItem("calorie-days", JSON.stringify(days));
      const b = document.getElementById("save-badge");
      b.textContent = "✓"; setTimeout(() => b.textContent = "", 1200);
    } catch(e) {}
  }

  // All meals = defaults (minus deleted) + custom
  function loadDeletedDefaults() {
    try { return JSON.parse(localStorage.getItem("deleted-defaults") || "[]"); } catch { return []; }
  }
  function saveDeletedDefaults(arr) {
    try { localStorage.setItem("deleted-defaults", JSON.stringify(arr)); } catch {}
  }
  function loadCustomMeals() {
    try { return JSON.parse(localStorage.getItem("custom-meals") || "[]"); } catch { return []; }
  }
  function saveCustomMeals(meals) {
    try { localStorage.setItem("custom-meals", JSON.stringify(meals)); } catch {}
  }
  function getAllMeals() {
    const deleted = loadDeletedDefaults();
    const defaults = DEFAULT_MEALS.filter(m => !deleted.includes(m.id));
    return [...defaults, ...loadCustomMeals()];
  }

  function getTodayLog() { return (loadDays()[getTodayKey()] || []); }

  function addItemsToDay(items) {
    const days = loadDays();
    const key = getTodayKey();
    if (!days[key]) days[key] = [];
    items.forEach(item => days[key].push({ ...item, id: Date.now() + Math.random() }));
    saveDays(days);
    renderToday();
    hideAll();
    resetSelection();
  }

  function removeLogItem(id) {
    const days = loadDays();
    const key = getTodayKey();
    days[key] = (days[key] || []).filter(i => i.id !== id);
    saveDays(days);
    renderToday();
  }

  function deleteMeal(id) {
    if (String(id).startsWith("d")) {
      const deleted = loadDeletedDefaults();
      deleted.push(id);
      saveDeletedDefaults(deleted);
    } else {
      const meals = loadCustomMeals().filter(m => m.id !== id);
      saveCustomMeals(meals);
    }
    delete selected[id];
    delete quantities[id];
    renderMealsList();
    updateBasket();
  }

  function resetSelection() { quantities = {}; selected = {}; }

  function getBasket() {
    let totalCal = 0, totalProt = 0, items = [];
    getAllMeals().forEach(m => {
      if (selected[m.id]) {
        const qty = quantities[m.id] || 1;
        totalCal += Math.round(m.cal * qty);
        totalProt += Math.round(m.protein * qty);
        items.push({ name: qty > 1 ? `${m.name} ×${qty}` : m.name, cal: Math.round(m.cal * qty), protein: Math.round(m.protein * qty), emoji: m.emoji || "🍽️" });
      }
    });
    return { totalCal, totalProt, items };
  }

  function updateBasket() {
    const { totalCal, totalProt, items } = getBasket();
    const bar = document.getElementById("basket-bar");
    if (items.length > 0) {
      bar.classList.add("visible");
      document.getElementById("basket-cal").textContent = totalCal;
      document.getElementById("basket-prot").textContent = totalProt;
    } else {
      bar.classList.remove("visible");
    }
  }

  function addBasket() {
    const { items } = getBasket();
    if (items.length === 0) return;
    addItemsToDay(items);
  }

  function toggleSelected(id) {
    selected[id] = !selected[id];
    updateBasket();
    const checkEl = document.getElementById("check-" + id);
    if (checkEl) { checkEl.classList.toggle("checked", !!selected[id]); checkEl.textContent = selected[id] ? "✓" : ""; }
    const itemEl = document.getElementById("mitem-" + id);
    if (itemEl) itemEl.classList.toggle("selected", !!selected[id]);
  }

  function changeQty(id, delta) {
    quantities[id] = Math.max(1, (quantities[id] || 1) + delta);
    const qty = quantities[id];
    const numEl = document.getElementById("qty-" + id);
    if (numEl) numEl.textContent = qty;
    const meal = getAllMeals().find(m => String(m.id) === String(id));
    if (meal) {
      const metaEl = document.getElementById("meta-" + id);
      if (metaEl) metaEl.textContent = `${Math.round(meal.cal * qty)} kcal · ${Math.round(meal.protein * qty)}g eiwit`;
    }
    if (selected[id]) updateBasket();
  }

  function renderMealsList() {
    const meals = getAllMeals();
    document.getElementById("meals-list").innerHTML = meals.map(m => {
      const qty = quantities[m.id] || 1;
      const isSel = !!selected[m.id];
      return `
        <div class="meal-item ${isSel ? "selected" : ""}" id="mitem-${m.id}">
          <div class="meal-left" onclick="toggleSelected('${m.id}')">
            <span class="meal-emoji">${m.emoji || "🍽️"}</span>
            <div style="min-width:0;">
              <div class="meal-name">${m.name}</div>
              <div class="meal-cal" id="meta-${m.id}">${Math.round(m.cal * qty)} kcal · ${Math.round(m.protein * qty)}g eiwit</div>
            </div>
          </div>
          <div class="meal-controls">
            <button class="qty-btn" onclick="changeQty('${m.id}', -1)">−</button>
            <span class="qty-num" id="qty-${m.id}">${qty}</span>
            <button class="qty-btn" onclick="changeQty('${m.id}', 1)">+</button>
            <div class="meal-check ${isSel ? "checked" : ""}" id="check-${m.id}" onclick="toggleSelected('${m.id}')">${isSel ? "✓" : ""}</div>
            <button class="meal-delete" onclick="deleteMeal('${m.id}')">🗑</button>
          </div>
        </div>`;
    }).join("");
    updateBasket();
  }

  function renderToday() {
    const log = getTodayLog();
    const totalCal = log.reduce((s, i) => s + i.cal, 0);
    const totalProt = log.reduce((s, i) => s + i.protein, 0);
    const remaining = CALORIE_GOAL - totalCal;
    const calOver = totalCal > CALORIE_GOAL;

    document.getElementById("ring-cal-circle").setAttribute("stroke-dasharray", `${Math.min(totalCal/CALORIE_GOAL,1)*CIRC} ${CIRC}`);
    document.getElementById("ring-cal-circle").setAttribute("stroke", calOver ? "#ff4466" : "#e8003a");
    document.getElementById("ring-cal-val").textContent = totalCal;
    document.getElementById("ring-cal-val").style.color = calOver ? "#ff4466" : "#fff";
    document.getElementById("ring-prot-circle").setAttribute("stroke-dasharray", `${Math.min(totalProt/PROTEIN_GOAL,1)*CIRC} ${CIRC}`);
    document.getElementById("ring-prot-val").textContent = totalProt;

    const remEl = document.getElementById("remaining-val");
    if (remaining < 0) { remEl.textContent = `+${Math.abs(remaining)} over`; remEl.style.color = "#ff4466"; }
    else if (remaining < 300) { remEl.textContent = `${remaining} kcal`; remEl.style.color = "#ff8833"; }
    else { remEl.textContent = `${remaining} kcal`; remEl.style.color = "#e8003a"; }

    const list = document.getElementById("log-list");
    list.innerHTML = log.length === 0
      ? '<div class="empty-msg">Nog niets gelogd — voeg je eerste maaltijd toe!</div>'
      : log.map(item => `
          <div class="log-item">
            <div class="log-left">
              <span class="log-emoji">${item.emoji}</span>
              <div>
                <div class="log-name">${item.name}</div>
                <div class="log-meta">${item.cal} kcal · ${item.protein}g eiwit</div>
              </div>
            </div>
            <button class="remove-btn" onclick="removeLogItem(${item.id})">×</button>
          </div>`).join("");
  }

  function renderHistory() {
    const days = loadDays();
    const todayKey = getTodayKey();
    const entries = Object.entries(days).filter(([k]) => k !== todayKey).sort((a,b) => b[0].localeCompare(a[0])).slice(0,7);
    const list = document.getElementById("history-list");
    if (entries.length === 0) { list.innerHTML = '<div class="empty-msg">Nog geen geschiedenis.</div>'; return; }
    list.innerHTML = entries.map(([date, items]) => {
      const cal = items.reduce((s,i)=>s+i.cal,0);
      const prot = items.reduce((s,i)=>s+i.protein,0);
      const calColor = cal <= CALORIE_GOAL ? "#44cc88" : "#e8003a";
      const protColor = prot >= PROTEIN_GOAL ? "#aaaaaa" : "#ff8833";
      const label = new Date(date+"T12:00:00").toLocaleDateString("nl-NL",{weekday:"long",day:"numeric",month:"long"});
      return `<div class="history-day">
        <div class="history-date">${label}</div>
        <div class="badges">
          <span class="badge" style="background:${calColor}22;color:${calColor}">${cal} kcal</span>
          <span class="badge" style="background:${protColor}22;color:${protColor}">${prot}g eiwit</span>
          <span class="badge" style="background:#ffffff11;color:#555">${items.length} items</span>
        </div>
        <div>${items.map(i=>`<div class="history-item">${i.emoji} ${i.name} — ${i.cal} kcal</div>`).join("")}</div>
      </div>`;
    }).join("");
  }

  function showSelectSection() {
    document.getElementById("add-meal-btn").style.display = "none";
    document.getElementById("select-section").style.display = "block";
    document.getElementById("new-meal-section").style.display = "none";
    renderMealsList();
  }

  function showNewMealForm() {
    document.getElementById("select-section").style.display = "none";
    document.getElementById("new-meal-section").style.display = "block";
  }

  function backToSelect() {
    document.getElementById("new-meal-section").style.display = "none";
    document.getElementById("select-section").style.display = "block";
    renderMealsList();
  }

  function hideAll() {
    document.getElementById("add-meal-btn").style.display = "block";
    document.getElementById("select-section").style.display = "none";
    document.getElementById("new-meal-section").style.display = "none";
    resetSelection();
  }

  function saveNewMeal() {
    const name = document.getElementById("new-name").value.trim();
    const cal = parseInt(document.getElementById("new-cal").value) || 0;
    const prot = parseInt(document.getElementById("new-prot").value) || 0;
    if (!name || !cal) return;
    const meals = loadCustomMeals();
    meals.push({ id: Date.now(), name, cal, protein: prot, emoji: "🍽️" });
    saveCustomMeals(meals);
    document.getElementById("new-name").value = "";
    document.getElementById("new-cal").value = "";
    document.getElementById("new-prot").value = "";
    backToSelect();
  }

  function switchView(view) {
    document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
    document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
    document.getElementById("view-" + view).classList.add("active");
    document.getElementById("nav-" + view).classList.add("active");
    if (view === "history") renderHistory();
  }

  renderToday();
</script>
</body>
</html>
