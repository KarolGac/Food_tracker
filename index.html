<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Calories">
  <title>Calorie Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      background: #11111b;
      color: #cdd6f4;
      font-family: -apple-system, 'Inter', sans-serif;
      min-height: 100vh;
      max-width: 430px;
      margin: 0 auto;
      padding-bottom: 80px;
    }
    /* Header */
    .header {
      padding: 52px 20px 16px;
      border-bottom: 1px solid #1e1e2e;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }
    .header h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
    .header p { font-size: 12px; color: #6c7086; margin-top: 3px; }
    .save-badge { font-size: 11px; color: #45475a; }

    /* Rings */
    .rings { display: flex; justify-content: space-around; padding: 20px 16px 8px; }
    .ring-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .ring-svg { transform: rotate(-90deg); }
    .ring-inner { text-align: center; }
    .ring-val { font-weight: 700; line-height: 1; }
    .ring-max { color: #6c7086; line-height: 1.2; }
    .ring-label { font-size: 13px; font-weight: 600; text-align: center; }
    .ring-sub { font-size: 11px; color: #6c7086; text-align: center; }

    /* Remaining card */
    .remaining-card {
      background: #1e1e2e;
      border-radius: 14px;
      padding: 14px 16px;
      margin: 0 16px 12px;
      text-align: center;
    }
    .remaining-label { font-size: 12px; color: #6c7086; margin-bottom: 4px; }
    .remaining-val { font-size: 32px; font-weight: 800; letter-spacing: -1px; }

    /* Section */
    .section { padding: 16px; }
    .section-title {
      font-size: 13px; font-weight: 700; color: #6c7086;
      letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 10px;
    }

    /* Log items */
    .log-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 11px 0; border-bottom: 1px solid #313244;
    }
    .log-left { display: flex; align-items: center; gap: 10px; }
    .log-emoji { font-size: 22px; }
    .log-name { font-size: 14px; font-weight: 600; }
    .log-meta { font-size: 12px; color: #6c7086; }
    .remove-btn {
      background: none; border: none; color: #f38ba8;
      font-size: 20px; cursor: pointer; padding: 4px 8px; line-height: 1;
    }
    .empty-msg { text-align: center; color: #45475a; padding: 24px 0; font-size: 14px; }

    /* Buttons */
    .btn-primary {
      width: 100%; padding: 14px; background: #cba6f7; color: #11111b;
      border: none; border-radius: 12px; font-weight: 800; font-size: 15px;
      cursor: pointer; margin-top: 8px; display: block;
    }
    .btn-secondary {
      width: 100%; padding: 14px; background: #313244; color: #cdd6f4;
      border: none; border-radius: 12px; font-weight: 700; font-size: 15px;
      cursor: pointer; margin-top: 6px; display: block;
    }
    .btn-ghost {
      width: 100%; padding: 12px; background: none; color: #6c7086;
      border: none; border-radius: 12px; font-weight: 600; font-size: 14px;
      cursor: pointer; margin-top: 4px; display: block;
    }

    /* Preset items */
    .preset-item {
      background: #313244; border-radius: 10px; padding: 10px 12px;
      margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between;
    }
    .preset-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
    .preset-emoji { font-size: 22px; flex-shrink: 0; }
    .preset-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .preset-cal { font-size: 11px; color: #6c7086; }
    .preset-controls { display: flex; align-items: center; gap: 6px; flex-shrink: 0; margin-left: 8px; }
    .qty-btn {
      background: #45475a; border: none; border-radius: 7px; color: #cdd6f4;
      width: 32px; height: 32px; font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-weight: 700;
    }
    .qty-num { font-size: 15px; font-weight: 700; min-width: 20px; text-align: center; }
    .add-check {
      background: #cba6f7; border: none; border-radius: 8px;
      color: #11111b; font-weight: 800; font-size: 14px;
      padding: 6px 12px; cursor: pointer; margin-left: 2px;
    }

    /* Inputs */
    .input {
      width: 100%; background: #313244; border: 1px solid #45475a;
      border-radius: 10px; padding: 12px 14px; color: #cdd6f4;
      font-size: 15px; margin-bottom: 8px;
    }
    .input::placeholder { color: #6c7086; }
    .input:focus { outline: none; border-color: #cba6f7; }

    /* History */
    .history-day {
      background: #1e1e2e; border-radius: 12px;
      padding: 14px 16px; margin-bottom: 10px;
    }
    .history-date { font-size: 14px; font-weight: 700; margin-bottom: 8px; }
    .badges { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
    .badge {
      border-radius: 6px; padding: 2px 8px; font-size: 12px; font-weight: 600;
    }
    .history-items { }
    .history-item { font-size: 12px; color: #6c7086; padding: 2px 0; }

    /* Bottom nav */
    .bottom-nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px; background: #1e1e2e;
      border-top: 1px solid #313244; display: flex; z-index: 100;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .nav-btn {
      flex: 1; padding: 14px 0 10px; background: none; border: none;
      font-size: 11px; font-weight: 500; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      color: #6c7086;
    }
    .nav-btn.active { color: #cba6f7; font-weight: 700; }
    .nav-icon { font-size: 20px; }

    /* View toggling */
    .view { display: none; }
    .view.active { display: block; }

    /* Preset section toggle */
    #preset-section { display: none; margin-top: 12px; }
    #custom-section { display: none; margin-top: 12px; }
  </style>
</head>
<body>

<div class="header">
  <div>
    <h1>Calorie Tracker 💪</h1>
    <p id="goal-sub">Doel: 2500 kcal · 170g eiwit</p>
  </div>
  <span class="save-badge" id="save-badge"></span>
</div>

<!-- TODAY VIEW -->
<div class="view active" id="view-today">
  <div class="rings">
    <div class="ring-wrap">
      <div style="position:relative; width:130px; height:130px;">
        <svg class="ring-svg" width="130" height="130" style="position:absolute;top:0;left:0;">
          <circle cx="65" cy="65" r="59" fill="none" stroke="#1e1e2e" stroke-width="10"/>
          <circle id="ring-cal-circle" cx="65" cy="65" r="59" fill="none" stroke="#cba6f7" stroke-width="10"
            stroke-dasharray="0 370.7" stroke-linecap="round" style="transition: stroke-dasharray 0.4s ease"/>
        </svg>
        <div style="position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;">
          <span class="ring-val" id="ring-cal-val" style="font-size:23px;color:#cdd6f4;">0</span>
          <span class="ring-max" style="font-size:14px;">/ 2500</span>
        </div>
      </div>
      <div class="ring-label">Calorieën</div>
      <div class="ring-sub">kcal</div>
    </div>
    <div class="ring-wrap">
      <div style="position:relative; width:130px; height:130px;">
        <svg class="ring-svg" width="130" height="130" style="position:absolute;top:0;left:0;">
          <circle cx="65" cy="65" r="59" fill="none" stroke="#1e1e2e" stroke-width="10"/>
          <circle id="ring-prot-circle" cx="65" cy="65" r="59" fill="none" stroke="#89dceb" stroke-width="10"
            stroke-dasharray="0 370.7" stroke-linecap="round" style="transition: stroke-dasharray 0.4s ease"/>
        </svg>
        <div style="position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;">
          <span class="ring-val" id="ring-prot-val" style="font-size:23px;color:#cdd6f4;">0</span>
          <span class="ring-max" style="font-size:14px;">/ 170</span>
        </div>
      </div>
      <div class="ring-label">Eiwit</div>
      <div class="ring-sub">gram</div>
    </div>
  </div>

  <div class="remaining-card">
    <div class="remaining-label">Nog over vandaag</div>
    <div class="remaining-val" id="remaining-val">2500 kcal</div>
  </div>

  <div class="section">
    <div class="section-title">Gegeten vandaag</div>
    <div id="log-list"></div>

    <button class="btn-primary" id="add-meal-btn" onclick="showPresets()">+ Maaltijd toevoegen</button>

    <!-- Preset section -->
    <div id="preset-section">
      <div class="section-title" style="margin-top:4px;">Snel toevoegen</div>
      <div id="preset-list"></div>
      <button class="btn-secondary" onclick="showCustom()">+ Eigen maaltijd invoeren</button>
      <button class="btn-ghost" onclick="hideAll()">Annuleren</button>
    </div>

    <!-- Custom section -->
    <div id="custom-section">
      <div class="section-title" style="margin-top:4px;">Eigen maaltijd</div>
      <input class="input" id="custom-name" placeholder="Naam (bijv. Rijst 200g)" type="text">
      <input class="input" id="custom-cal" placeholder="Calorieën (kcal)" type="number" inputmode="numeric">
      <input class="input" id="custom-prot" placeholder="Eiwit (gram)" type="number" inputmode="numeric">
      <button class="btn-primary" onclick="addCustom()">Toevoegen</button>
      <button class="btn-ghost" onclick="hideAll()">Annuleren</button>
    </div>
  </div>
</div>

<!-- HISTORY VIEW -->
<div class="view" id="view-history">
  <div class="section">
    <div class="section-title">Afgelopen dagen</div>
    <div id="history-list"></div>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" id="nav-today" onclick="switchView('today')">
    <span class="nav-icon">🏠</span>Vandaag
  </button>
  <button class="nav-btn" id="nav-history" onclick="switchView('history')">
    <span class="nav-icon">📅</span>Geschiedenis
  </button>
</div>

<script>
  const CALORIE_GOAL = 2500;
  const PROTEIN_GOAL = 170;
  const CIRC = 2 * Math.PI * 59;

  const PRESETS = [
    { name: "Ei", cal: 70, protein: 6, emoji: "🥚" },
    { name: "Ontbijtspek (1 slice)", cal: 30, protein: 3, emoji: "🥓" },
    { name: "Banaan", cal: 90, protein: 1, emoji: "🍌" },
    { name: "Kiwi", cal: 40, protein: 1, emoji: "🥝" },
    { name: "Upfront Oats (75g)", cal: 301, protein: 18, emoji: "🥣" },
    { name: "Bulk Whey (1 scoop)", cal: 115, protein: 22, emoji: "💪" },
    { name: "Kipfilet (100g)", cal: 110, protein: 23, emoji: "🍗" },
    { name: "Kip dij (100g)", cal: 190, protein: 18, emoji: "🍗" },
    { name: "Aardappelen (100g)", cal: 85, protein: 2, emoji: "🥔" },
    { name: "Turkse pizza", cal: 1000, protein: 45, emoji: "🍕" },
    { name: "Koreaanse mango ice", cal: 110, protein: 1, emoji: "🍦" },
  ];

  let quantities = Object.fromEntries(PRESETS.map((_, i) => [i, 1]));

  function getTodayKey() {
    return new Date().toISOString().split("T")[0];
  }

  function loadDays() {
    try {
      return JSON.parse(localStorage.getItem("calorie-days") || "{}");
    } catch { return {}; }
  }

  function saveDays(days) {
    try {
      localStorage.setItem("calorie-days", JSON.stringify(days));
      const badge = document.getElementById("save-badge");
      badge.textContent = "✓ opgeslagen";
      setTimeout(() => badge.textContent = "", 1500);
    } catch(e) { console.error(e); }
  }

  function getTodayLog() {
    const days = loadDays();
    return days[getTodayKey()] || [];
  }

  function addItemToDay(item) {
    const days = loadDays();
    const key = getTodayKey();
    if (!days[key]) days[key] = [];
    days[key].push({ ...item, id: Date.now() });
    saveDays(days);
    renderToday();
    hideAll();
    resetQuantities();
  }

  function removeItem(id) {
    const days = loadDays();
    const key = getTodayKey();
    days[key] = (days[key] || []).filter(i => i.id !== id);
    saveDays(days);
    renderToday();
  }

  function resetQuantities() {
    quantities = Object.fromEntries(PRESETS.map((_, i) => [i, 1]));
    renderPresets();
  }

  function renderToday() {
    const log = getTodayLog();
    const totalCal = log.reduce((s, i) => s + i.cal, 0);
    const totalProt = log.reduce((s, i) => s + i.protein, 0);
    const remaining = CALORIE_GOAL - totalCal;

    // Rings
    const calPct = Math.min(totalCal / CALORIE_GOAL, 1);
    const protPct = Math.min(totalProt / PROTEIN_GOAL, 1);
    const calOver = totalCal > CALORIE_GOAL;
    const protOver = totalProt > PROTEIN_GOAL;

    document.getElementById("ring-cal-circle").setAttribute("stroke-dasharray", `${calPct * CIRC} ${CIRC}`);
    document.getElementById("ring-cal-circle").setAttribute("stroke", calOver ? "#f38ba8" : "#cba6f7");
    document.getElementById("ring-cal-val").textContent = totalCal;
    document.getElementById("ring-cal-val").style.color = calOver ? "#f38ba8" : "#cdd6f4";

    document.getElementById("ring-prot-circle").setAttribute("stroke-dasharray", `${protPct * CIRC} ${CIRC}`);
    document.getElementById("ring-prot-circle").setAttribute("stroke", protOver ? "#f38ba8" : "#89dceb");
    document.getElementById("ring-prot-val").textContent = totalProt;
    document.getElementById("ring-prot-val").style.color = protOver ? "#f38ba8" : "#cdd6f4";

    // Remaining
    const remEl = document.getElementById("remaining-val");
    if (remaining < 0) {
      remEl.textContent = `+${Math.abs(remaining)} over`;
      remEl.style.color = "#f38ba8";
    } else if (remaining < 300) {
      remEl.textContent = `${remaining} kcal`;
      remEl.style.color = "#fab387";
    } else {
      remEl.textContent = `${remaining} kcal`;
      remEl.style.color = "#a6e3a1";
    }

    // Log list
    const list = document.getElementById("log-list");
    if (log.length === 0) {
      list.innerHTML = '<div class="empty-msg">Nog niets gelogd — voeg je eerste maaltijd toe!</div>';
    } else {
      list.innerHTML = log.map(item => `
        <div class="log-item">
          <div class="log-left">
            <span class="log-emoji">${item.emoji}</span>
            <div>
              <div class="log-name">${item.name}</div>
              <div class="log-meta">${item.cal} kcal · ${item.protein}g eiwit</div>
            </div>
          </div>
          <button class="remove-btn" onclick="removeItem(${item.id})">×</button>
        </div>
      `).join("");
    }
  }

  function renderPresets() {
    const list = document.getElementById("preset-list");
    list.innerHTML = PRESETS.map((p, i) => {
      const qty = quantities[i] || 1;
      return `
        <div class="preset-item">
          <div class="preset-left">
            <span class="preset-emoji">${p.emoji}</span>
            <div>
              <div class="preset-name">${p.name}</div>
              <div class="preset-cal" id="preset-meta-${i}">${Math.round(p.cal * qty)} kcal · ${Math.round(p.protein * qty)}g eiwit</div>
            </div>
          </div>
          <div class="preset-controls">
            <button class="qty-btn" onclick="changeQty(${i}, -1)">−</button>
            <span class="qty-num" id="qty-${i}">${qty}</span>
            <button class="qty-btn" onclick="changeQty(${i}, 1)">+</button>
            <button class="add-check" onclick="addPreset(${i})">✓</button>
          </div>
        </div>
      `;
    }).join("");
  }

  function renderHistory() {
    const days = loadDays();
    const todayKey = getTodayKey();
    const entries = Object.entries(days)
      .filter(([k]) => k !== todayKey)
      .sort((a, b) => b[0].localeCompare(a[0]))
      .slice(0, 7);

    const list = document.getElementById("history-list");
    if (entries.length === 0) {
      list.innerHTML = '<div class="empty-msg">Nog geen geschiedenis — begin vandaag met loggen!</div>';
      return;
    }
    list.innerHTML = entries.map(([date, items]) => {
      const cal = items.reduce((s, i) => s + i.cal, 0);
      const prot = items.reduce((s, i) => s + i.protein, 0);
      const calColor = cal <= CALORIE_GOAL ? "#a6e3a1" : "#f38ba8";
      const protColor = prot >= PROTEIN_GOAL ? "#89dceb" : "#fab387";
      const d = new Date(date + "T12:00:00");
      const label = d.toLocaleDateString("nl-NL", { weekday: "long", day: "numeric", month: "long" });
      return `
        <div class="history-day">
          <div class="history-date">${label}</div>
          <div class="badges">
            <span class="badge" style="background:${calColor}22;color:${calColor}">${cal} kcal</span>
            <span class="badge" style="background:${protColor}22;color:${protColor}">${prot}g eiwit</span>
            <span class="badge" style="background:#6c708622;color:#6c7086">${items.length} items</span>
          </div>
          <div class="history-items">
            ${items.map(item => `<div class="history-item">${item.emoji} ${item.name} — ${item.cal} kcal</div>`).join("")}
          </div>
        </div>
      `;
    }).join("");
  }

  function changeQty(idx, delta) {
    quantities[idx] = Math.max(1, (quantities[idx] || 1) + delta);
    const p = PRESETS[idx];
    const qty = quantities[idx];
    document.getElementById(`qty-${idx}`).textContent = qty;
    document.getElementById(`preset-meta-${idx}`).textContent =
      `${Math.round(p.cal * qty)} kcal · ${Math.round(p.protein * qty)}g eiwit`;
  }

  function addPreset(idx) {
    const p = PRESETS[idx];
    const qty = quantities[idx] || 1;
    addItemToDay({
      name: qty > 1 ? `${p.name} ×${qty}` : p.name,
      cal: Math.round(p.cal * qty),
      protein: Math.round(p.protein * qty),
      emoji: p.emoji,
    });
  }

  function addCustom() {
    const name = document.getElementById("custom-name").value.trim();
    const cal = parseInt(document.getElementById("custom-cal").value) || 0;
    const prot = parseInt(document.getElementById("custom-prot").value) || 0;
    if (!name || !cal) return;
    addItemToDay({ name, cal, protein: prot, emoji: "🍽️" });
    document.getElementById("custom-name").value = "";
    document.getElementById("custom-cal").value = "";
    document.getElementById("custom-prot").value = "";
  }

  function showPresets() {
    document.getElementById("add-meal-btn").style.display = "none";
    document.getElementById("preset-section").style.display = "block";
    document.getElementById("custom-section").style.display = "none";
    renderPresets();
  }

  function showCustom() {
    document.getElementById("preset-section").style.display = "none";
    document.getElementById("custom-section").style.display = "block";
  }

  function hideAll() {
    document.getElementById("add-meal-btn").style.display = "block";
    document.getElementById("preset-section").style.display = "none";
    document.getElementById("custom-section").style.display = "none";
  }

  function switchView(view) {
    document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
    document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
    document.getElementById("view-" + view).classList.add("active");
    document.getElementById("nav-" + view).classList.add("active");
    if (view === "history") renderHistory();
  }

  // Init
  renderToday();
</script>
</body>
</html>
